<!DOCTYPE html>
<html>

<head>
    <title>Timeline</title>
    <link rel="stylesheet" href="styles_timeline.css">
</head>

<body>

    <div class="noite">
        <div class="card">
            <section class="about-timeline">
                <div class="wrapper inner-wrapper-padding ">

                    <div class="start-point">
                        <div class="black-dot"></div>
                        <h4>Inicio</h4>
                        <div class="corner bl"></div>
                    </div>

                    <div class="timeline-main">
                        <div class="timeline-row">

                            <div class="timeline-box timeline-content-img logo-timeline-arrow">
                                <div class="timeline-box-wrap">
                                    <h6>2019</h6>
                                    <div class="timeline-content">

                                        <img src="meeff.jpg"
                                            alt="">
                                        <div class="timeline-content-txt">
                                            <p>Nossa primeira mensagem</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="timeline-box timeline-content-img logo-timeline-arrow">
                                <div class="timeline-box-wrap">
                                    <h6>2020</h6>
                                    <div class="timeline-content">
                                        <div class="timeline-content-txt">
                                            <p>Nosso primeiro encontro.</p>
                                        </div>
                                        <img src="primeiro encontro.jpg"
                                            alt="">
                                    </div>
                                </div>
                            </div>
                            <div class="horizontal-line"></div>
                            <div class="verticle-line"></div>
                            <div class="corner top"></div>
                            <div class="corner bottom"></div>
                        </div>


                        <div class="timeline-row">
                            <div class="timeline-box img-right timeline-content-img">
                                <div class="timeline-box-wrap">
                                    <h6>2021</h6>
                                    <div class="timeline-content">
                                        <div class="timeline-content-txt">
                                            <p>Primeira vez juntos em domingos martins
                                            </p>
                                        </div>
                                        <img src="dm.jpg"
                                            alt="">
                                    </div>
                                </div>
                            </div>
                            <div class="timeline-box img-right timeline-content-img top-timeline-arrow">
                                <div class="timeline-box-wrap">
                                    <h6>2021</h6>
                                    <div class="timeline-content">
                                        <div class="timeline-content-txt">
                                            <p>Primeiro natal juntos</p>
                                        </div>
                                        <img src="primeiro natal juntos 2021.jpg"
                                            alt="">
                                    </div>
                                </div>
                            </div>
                            <div class="horizontal-line"></div>
                            <div class="verticle-line"></div>
                            <div class="corner top"></div>
                            <div class="corner bottom"></div>
                        </div>
                        <div class="timeline-row">
                            <div class="timeline-box img-left timeline-content-img">
                                <div class="timeline-box-wrap">
                                    <h6>2022</h6>
                                    <div class="timeline-content">
                                        <div class="timeline-content-txt">
                                            <p>Casamento da sua irmã</p>
                                        </div>
                                        <img src="csamento da sua irma2022.jpg"
                                            alt="">
                                    </div>
                                </div>
                            </div>
                            <div class="timeline-box timeline-content-img">
                                <div class="timeline-box-wrap">
                                    <h6>2022</h6>
                                    <div class="timeline-content">
                                        <div class="timeline-content-txt">
                                            <p>oficialmente autista</p>
                                            <p>&nbsp;</p>
                                        </div>
                                        <img src="autistinha.jpg"
                                            alt="">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="horizontal-line"></div>
                            <div class="verticle-line"></div>
                            <div class="corner top"></div>
                            <div class="corner bottom"></div>
                            <div class="start-point end-point">
                                <h4>Continua....</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </div>
    <div class="constelacao"></div>

    <div class="lua">
        <div class="textura"></div>
    </div>

    <div class="chuvaMeteoro"></div>

    <script src="script.js"></script>

</html>
